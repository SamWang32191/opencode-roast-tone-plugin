name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Select semantic version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Bump version, tag, and publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Ensure workflow runs on default branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Releases must run from the default branch: ${{ github.event.repository.default_branch }}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        run: |
          npm version "${{ inputs.bump }}" -m "chore(release): %s"

      - name: Push release commit and tag
        run: git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags

      - name: Publish package to npm (OIDC trusted publishing)
        run: npm publish --provenance --access public
